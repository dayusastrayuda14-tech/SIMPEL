<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>SIMPEL</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: #f1f2f6;
}

.sidebar {
  width: 220px;
  height: 100vh;
  background: linear-gradient(180deg, #5ca362, #9ff5b5);
  color: white;
  position: fixed;
  padding: 20px;
}

.sidebar p {
  cursor: pointer;
  padding: 10px;
  border-radius: 8px;
}

.sidebar p:hover {
  background: rgba(255,255,255,0.2);
}

.content {
  margin-left: 240px;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 5px;
  background: #28d854;
  color: white;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

#popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
  z-index:999;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>💰 SIMPEL</h2>

  <p onclick="showPage('dashboard')">🏠 Dashboard</p>
  <p onclick="showPage('transaksi')">💰 Transaksi</p>
  <p onclick="showPage('target')">🎯 Target</p>

  <hr>
  <button onclick="logout()">Logout</button>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dashboardPage">
  <h2 id="welcome"></h2>

  <div class="card">
    <h1>💰 Saldo Kamu</h1>
    <h2>Rp <span id="saldo">0</span></h2>
  </div>

  <div class="card">
    <h3>📊 Grafik Keuangan</h3>
    <canvas id="chart"></canvas>
  </div>
</div>

<!-- TRANSAKSI -->
<div id="transaksiPage" style="display:none;">
  <button onclick="bukaForm('masuk')">➕ Pemasukan</button>
  <button onclick="bukaForm('keluar')">➖ Pengeluaran</button>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Keterangan</th>
          <th>Jumlah</th>
          <th>Tipe</th>
          <th>Kategori</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="tabel"></tbody>
    </table>
  </div>
</div>

<!-- TARGET -->
<div id="targetPage" style="display:none;">

  <div class="card">
    <h3>🎯 Tambah Target Baru</h3>

    <input id="targetNama" placeholder="Nama target"><br><br>
    <input id="inputTarget" placeholder="Jumlah target"><br><br>

    <button onclick="setTarget()">+ Tambah Target</button>
  </div>

  <div class="card">
    <h3>📌 History Target</h3>
    <div id="targetList"></div>
  </div>

</div>

</div>

<!-- POPUP -->
<div id="popup">
  <div style="background:white;padding:20px;border-radius:15px;">
    <input id="ket" placeholder="Keterangan"><br><br>
    <input id="jumlah" placeholder="Jumlah"><br><br>

    <select id="kategori">
      <option value="kebutuhan">Kebutuhan</option>
      <option value="keinginan">Keinginan</option>
    </select><br><br>

    <button onclick="simpan()">Simpan</button>
    <button onclick="tutupForm()">Batal</button>
  </div>
</div>

<script>

let user = localStorage.getItem("loginUser") || "User";

// 🔥 FIX MULTI USER (INI YANG PENTING)
let transaksiKey = "transaksi_" + user;
let targetKey = "target_" + user;

let transaksi = JSON.parse(localStorage.getItem(transaksiKey)) || [];
let targetHistory = JSON.parse(localStorage.getItem(targetKey)) || [];

let tipeSekarang = "";

document.getElementById("welcome").innerText = "Halo, " + user + " 👋";

function formatRupiah(a){
  return (a || 0).toLocaleString('id-ID');
}

// ===== RENDER =====
function render(){

  let tabel = document.getElementById("tabel");
  tabel.innerHTML = "";

  let saldo = 0;
  let masuk = 0;
  let keluar = 0;

  transaksi.forEach((t,i)=>{
    if(t.tipe==="masuk"){
      saldo += t.jumlah;
      masuk += t.jumlah;
    } else {
      saldo -= t.jumlah;
      keluar += t.jumlah;
    }

    tabel.innerHTML += `
    <tr>
      <td>${t.ket}</td>
      <td>${formatRupiah(t.jumlah)}</td>
      <td>${t.tipe}</td>
      <td>${t.kategori}</td>
      <td><button onclick="hapus(${i})">❌</button></td>
    </tr>`;
  });

  document.getElementById("saldo").innerText = formatRupiah(saldo);

  if(window.chartInstance) chartInstance.destroy();

  window.chartInstance = new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{
      labels:["Masuk","Keluar"],
      datasets:[{
        data:[masuk,keluar],
        backgroundColor:["green","red"]
      }]
    }
  });

  renderTarget(saldo);
}

// ===== TARGET =====
function setTarget(){

  let nama = document.getElementById("targetNama").value;
  let val = parseFloat(document.getElementById("inputTarget").value);

  if(!nama || !val) return alert("Isi dulu!");

  targetHistory.push({
    nama,
    target: val,
    tabungan: 0, // 🔥 tambahan
    created: new Date().toLocaleDateString()
  });

  localStorage.setItem(targetKey, JSON.stringify(targetHistory));

  render();
}

function renderTarget(saldo){

 let box = document.getElementById("targetList");
  box.innerHTML = "";

  targetHistory.forEach((t,i)=>{

    let progress = (t.tabungan || 0);
    let persen = Math.min((progress / t.target) * 100, 100);
    let sisa = t.target - progress;

    box.innerHTML += `
    <div style="padding:10px;border-bottom:1px solid #ddd;">
      <b>${t.nama}</b><br>
      Target: Rp ${formatRupiah(t.target)}<br>
      Terkumpul: Rp ${formatRupiah(progress)}<br>
      Sisa: Rp ${formatRupiah(sisa > 0 ? sisa : 0)}<br>

      <div style="background:#ddd;border-radius:10px;height:10px;margin:5px 0;">
        <div style="width:${persen}%;background:green;height:10px;border-radius:10px;"></div>
      </div>

      Progress: ${persen.toFixed(0)}%<br>

      <input id="nabung${i}" placeholder="Tambah tabungan"><br>
      <button onclick="tambahTabungan(${i})">💰 Nabung</button>

      <br>Dibuat: ${t.created}
    </div>`;
  });
}

  function tambahTabungan(i){

  let input = document.getElementById("nabung"+i).value;
  let val = parseFloat(input);

  if(!val) return alert("Isi jumlah nabung!");

  targetHistory[i].tabungan += val;

  localStorage.setItem(targetKey, JSON.stringify(targetHistory));

  render();
}


// ===== TRANSAKSI =====
function simpan(){

  let ket = document.getElementById("ket").value;
  let jumlah = parseFloat(document.getElementById("jumlah").value);

  if(!ket || !jumlah) return alert("Isi dulu!");

  transaksi.push({
    ket,
    jumlah,
    tipe:tipeSekarang,
    kategori:document.getElementById("kategori").value
  });

  localStorage.setItem(transaksiKey, JSON.stringify(transaksi));

  render();
  tutupForm();
}

function hapus(i){
  transaksi.splice(i,1);
  localStorage.setItem(transaksiKey, JSON.stringify(transaksi));
  render();
}

function bukaForm(t){
  tipeSekarang=t;
  document.getElementById("popup").style.display="flex";
}

function tutupForm(){
  document.getElementById("popup").style.display="none";
}

// ===== NAV =====
function showPage(p){
  document.querySelectorAll(".content > div").forEach(e=>e.style.display="none");
  document.getElementById(p+"Page").style.display="block";
}

function logout(){
  localStorage.removeItem("loginUser");
  location.href="index.html";
}

render();

</script>

</body>
</html>
