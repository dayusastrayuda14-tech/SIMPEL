<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login SIMPEL</title>

<style>
body {
  font-family: 'Segoe UI';
  background: linear-gradient(135deg, #7fdb9b, #7be79c);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 10px;
  background: #020814;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
  <h2>Login</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p>Belum punya akun?</p>
  <button onclick="window.location.href='register.html'">Daftar</button>
</div>

<script src="script.js"></script>

</body>
</html>
